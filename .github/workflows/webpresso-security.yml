name: Reusable Webpresso security

on:
  workflow_call:
    inputs:
      install_command:
        description: "Caller-owned install/bootstrap command block"
        required: true
        type: string
      security_command:
        description: "Caller-owned security command block"
        required: true
        type: string
      runner:
        description: "Runner label"
        required: false
        default: ubuntu-latest
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  security:
    name: security
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./

      - uses: webpresso/github-actions/.github/actions/setup-webpresso-toolchain@3e86d0ab035d3c3e7e9a6f50896a3204bd6f6209

      - name: Install caller CLI globals
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' > /tmp/webpresso-cli-globals
          const fs = require('node:fs')
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const dev = pkg.devDependencies ?? {}
          const specs = []
          const vp = dev['vite-plus']
          const ak = dev['@webpresso/agent-kit']
          if (typeof vp === 'string' && vp && vp !== 'catalog:' && !vp.startsWith('workspace:')) specs.push(`vite-plus@${vp}`)
          if (typeof ak === 'string' && ak && ak !== 'catalog:' && !ak.startsWith('workspace:')) specs.push(`@webpresso/agent-kit@${ak}`)
          process.stdout.write(specs.join(' '))
          NODE
          if [[ -s /tmp/webpresso-cli-globals ]]; then
            npm install -g $(cat /tmp/webpresso-cli-globals)
          fi

      - name: Install caller dependencies
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$INSTALL_COMMAND"

      - name: Run caller security block
        shell: bash
        env:
          SECURITY_COMMAND: ${{ inputs.security_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$SECURITY_COMMAND"
