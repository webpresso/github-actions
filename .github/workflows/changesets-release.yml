name: Reusable Changesets release prep

on:
  workflow_call:
    inputs:
      install_command:
        description: "Caller-owned install/bootstrap command block"
        required: true
        type: string
      version_command:
        description: "Caller-owned Changesets version command block"
        required: false
        default: pnpm run version
        type: string
      publish_command:
        description: "Caller-owned post-version release preparation command block"
        required: false
        default: pnpm run release:publish
        type: string
      runner:
        description: "Runner label"
        required: false
        default: ubuntu-latest
        type: string
    outputs:
      published:
        description: "Whether the post-version release preparation path ran"
        value: ${{ jobs.release.outputs.published }}
      release_version:
        description: "Resolved release version from the caller publish result"
        value: ${{ jobs.release.outputs.release_version }}
      publish_state:
        description: "Caller-defined terminal release-prep state"
        value: ${{ jobs.release.outputs.publish_state }}
      should_deploy:
        description: "Whether the caller should proceed to production deploy finalization"
        value: ${{ jobs.release.outputs.should_deploy }}
      package_name:
        description: "Caller package name reported by the release-prep result"
        value: ${{ jobs.release.outputs.package_name }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.publish_result.outputs.published }}
      release_version: ${{ steps.publish_result.outputs.release_version }}
      publish_state: ${{ steps.publish_result.outputs.publish_state }}
      should_deploy: ${{ steps.publish_result.outputs.should_deploy }}
      package_name: ${{ steps.publish_result.outputs.package_name }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Resolve caller pnpm version
        id: pnpm
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const packageManager = typeof manifest.packageManager === 'string' ? manifest.packageManager : '';
          const match = /^pnpm@(.+)$/u.exec(packageManager);
          if (!match) {
            throw new Error('package.json must declare packageManager like "pnpm@<version>" for the shared release harness.');
          }
          console.log(`version=${match[1]}`);
          NODE

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ steps.pnpm.outputs.version }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.16.0'
          package-manager-cache: false

      - name: Enable Corepack + caller pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${{ steps.pnpm.outputs.version }}" --activate

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install caller dependencies
        shell: bash
        env:
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$INSTALL_COMMAND"

      - name: Reset release-prep handoff
        shell: bash
        run: rm -f "$RUNNER_TEMP/release-publish-result.json"

      - name: Create Release Pull Request or prepare a deployable release
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1 branch
        with:
          version: ${{ inputs.version_command }}
          publish: ${{ inputs.publish_command }}
          createGithubReleases: false
          commit: Version Packages
          title: Version Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
          RELEASE_PUBLISH_RESULT_FILE: ${{ runner.temp }}/release-publish-result.json

      - name: Read explicit release-prep result
        id: publish_result
        shell: bash
        run: |
          set -euo pipefail
          result_file="$RUNNER_TEMP/release-publish-result.json"
          if [ ! -f "$result_file" ]; then
            {
              echo "published=false"
              echo "release_version="
              echo "publish_state=missing"
              echo "should_deploy=false"
              echo "package_name="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          package_name=$(node -e "const data=require(process.argv[1]); process.stdout.write(String(data.packageName ?? ''))" "$result_file")
          release_version=$(node -e "const data=require(process.argv[1]); process.stdout.write(String(data.version ?? ''))" "$result_file")
          publish_state=$(node -e "const data=require(process.argv[1]); process.stdout.write(String(data.publishState ?? 'missing'))" "$result_file")
          should_deploy=false
          case "$publish_state" in
            published|already-published|prepared|already-prepared)
              should_deploy=true
              ;;
          esac

          {
            echo "published=true"
            echo "package_name=$package_name"
            echo "release_version=$release_version"
            echo "publish_state=$publish_state"
            echo "should_deploy=$should_deploy"
          } >> "$GITHUB_OUTPUT"
