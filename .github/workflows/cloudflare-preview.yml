name: Reusable Cloudflare preview deploy

on:
  workflow_call:
    inputs:
      lane:
        description: "Canonical preview lane: preview_main or preview_pr_<n>"
        required: true
        type: string
      mode:
        description: "deploy or destroy"
        required: false
        default: deploy
        type: string
      install_command:
        description: "Caller-owned install/bootstrap command block"
        required: true
        type: string
      verify_command:
        description: "Caller-owned verify/build command block"
        required: true
        type: string
      deploy_command:
        description: "Caller-owned deploy command block"
        required: true
        type: string
      destroy_command:
        description: "Caller-owned preview destroy command block"
        required: false
        default: ""
        type: string
      smoke_command:
        description: "Caller-owned post-deploy smoke command block"
        required: false
        default: ""
        type: string
      secret_profile:
        description: "Repo-owned secret profile name from .webpresso/secrets.config.json"
        required: false
        default: ""
        type: string
      doppler_identity_id:
        description: "Doppler OIDC service account identity ID (safe to commit)"
        required: false
        default: ""
        type: string
      infisical_identity_id:
        description: "Infisical OIDC machine identity ID (safe to commit)"
        required: false
        default: ""
        type: string
      runner:
        description: "Runner label"
        required: false
        default: ubuntu-latest
        type: string
    secrets:
      ci_secret_provider_token:
        required: false
      cloudflare_account_id:
        required: false
      cloudflare_api_token:
        required: false
      cloudflare_zone_id:
        required: false
      neon_api_key:
        required: false
      neon_project_id:
        required: false
      neon_parent_branch_id:
        required: false
      pulumi_access_token:
        required: false
      better_auth_secret:
        required: false
      jwt_secret:
        required: false
      langfuse_public_key:
        required: false
      langfuse_secret_key:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preview:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: read
      id-token: write
    env:
      DEPLOY_LANE: ${{ inputs.lane }}
      DEPLOY_MODE: ${{ inputs.mode }}
      RELEASE_VERSION: ""
      SECRET_PROFILE: ${{ inputs.secret_profile }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.cloudflare_account_id }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare_api_token }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.cloudflare_zone_id }}
      NEON_API_KEY: ${{ secrets.neon_api_key }}
      NEON_PROJECT_ID: ${{ secrets.neon_project_id }}
      NEON_PARENT_BRANCH_ID: ${{ secrets.neon_parent_branch_id }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.pulumi_access_token }}
      BETTER_AUTH_SECRET: ${{ secrets.better_auth_secret }}
      JWT_SECRET: ${{ secrets.jwt_secret }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.langfuse_public_key }}
      LANGFUSE_SECRET_KEY: ${{ secrets.langfuse_secret_key }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate preview contract inputs
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const lane = process.env.DEPLOY_LANE ?? "";
          const mode = process.env.DEPLOY_MODE ?? "";
          if (!/^preview_main$|^preview_pr_\d+$/u.test(lane)) {
            throw new Error(`Invalid preview lane "${lane}". Use preview_main or preview_pr_<n>.`);
          }
          if (mode !== "deploy" && mode !== "destroy") {
            throw new Error(`Invalid preview mode "${mode}". Use deploy or destroy.`);
          }
          NODE

      - uses: webpresso/github-actions/.github/actions/setup-webpresso-toolchain@17b626bc3b6157e9919e1204fe263047093e3438
        with:
          cli-global-packages: "vite-plus @webpresso/agent-kit@2.3.2"

      - name: Read committed secret-manager metadata
        id: secret_config
        shell: bash
        run: |
          set -euo pipefail
          SECRET_PROFILE="${SECRET_PROFILE}" node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const path = ".webpresso/secrets.config.json";
          if (!fs.existsSync(path)) {
            throw new Error(`Missing ${path}. Commit repo secret-manager metadata before using the shared deploy harness.`);
          }
          const payload = JSON.parse(fs.readFileSync(path, "utf8"));
          if (payload?.schemaVersion !== 1) {
            throw new Error(`Invalid ${path}. Expected schemaVersion 1 secret metadata.`);
          }
          const defaultProvider = payload?.providers?.default;
          const manager = defaultProvider?.type;
          const projectId = defaultProvider?.project;
          const secretProfile = process.env.SECRET_PROFILE ?? "";
          const profiles = payload?.profiles;
          const hasProfiles = typeof profiles === "object" && profiles !== null && !Array.isArray(profiles);
          const profile = hasProfiles ? profiles[secretProfile] : undefined;
          const environment = hasProfiles ? profile?.environment : secretProfile;
          if (manager !== "doppler" && manager !== "infisical") {
            throw new Error(`Unsupported providers.default.type "${String(manager)}" in ${path}.`);
          }
          if (typeof projectId !== "string" || projectId.length === 0) {
            throw new Error(`Invalid providers.default.project in ${path}.`);
          }
          if (typeof secretProfile !== "string" || secretProfile.length === 0) {
            throw new Error(`Missing workflow_call input secret_profile.`);
          }
          if (typeof environment !== "string" || environment.length === 0) {
            throw new Error(`Unknown secret profile "${secretProfile}" in ${path}.`);
          }
          console.log(`manager=${manager}`);
          console.log(`project_id=${projectId}`);
          console.log(`secret_environment=${environment}`);
          NODE

      - name: Detect direct deploy secrets
        id: direct_secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${CLOUDFLARE_ACCOUNT_ID}" || -n "${CLOUDFLARE_API_TOKEN}" || -n "${CLOUDFLARE_ZONE_ID}" || -n "${NEON_API_KEY}" || -n "${NEON_PROJECT_ID}" || -n "${NEON_PARENT_BRANCH_ID}" || -n "${PULUMI_ACCESS_TOKEN}" || -n "${BETTER_AUTH_SECRET}" || -n "${JWT_SECRET}" || -n "${LANGFUSE_PUBLIC_KEY}" || -n "${LANGFUSE_SECRET_KEY}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect optional Doppler bootstrap token
        id: doppler_token
        shell: bash
        env:
          CI_SECRET_PROVIDER_TOKEN: ${{ secrets.ci_secret_provider_token }}
        run: |
          set -euo pipefail
          if [[ -n "${CI_SECRET_PROVIDER_TOKEN}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate secret-manager bootstrap inputs
        shell: bash
        env:
          SECRET_MANAGER: ${{ steps.secret_config.outputs.manager }}
          TOKEN_PRESENT: ${{ steps.doppler_token.outputs.present }}
          DIRECT_SECRETS_PRESENT: ${{ steps.direct_secrets.outputs.present }}
          DOPPLER_IDENTITY_ID: ${{ inputs.doppler_identity_id }}
          INFISICAL_IDENTITY_ID: ${{ inputs.infisical_identity_id }}
          SECRET_PROFILE: ${{ inputs.secret_profile }}
        run: |
          set -euo pipefail
          case "${SECRET_MANAGER}" in
            doppler)
              if [[ "${DIRECT_SECRETS_PRESENT}" != "true" && "${TOKEN_PRESENT}" != "true" && -z "${DOPPLER_IDENTITY_ID}" ]]; then
                echo "Doppler bootstrap requires either workflow_call secret ci_secret_provider_token or input doppler_identity_id." >&2
                exit 1
              fi
              if [[ -z "${SECRET_PROFILE}" ]]; then
                echo "Doppler bootstrap requires workflow_call input secret_profile." >&2
                exit 1
              fi
              ;;
            infisical)
              if [[ -z "${INFISICAL_IDENTITY_ID}" ]]; then
                echo "Missing required workflow_call input: infisical_identity_id" >&2
                exit 1
              fi
              if [[ -z "${SECRET_PROFILE}" ]]; then
                echo "Infisical OIDC bootstrap requires workflow_call input secret_profile." >&2
                exit 1
              fi
              ;;
          esac

      - name: Fetch Doppler-managed runtime secrets via token
        if: ${{ steps.direct_secrets.outputs.present != 'true' && steps.secret_config.outputs.manager == 'doppler' && steps.doppler_token.outputs.present == 'true' }}
        uses: DopplerHQ/secrets-fetch-action@cd2efbf9a404504316435873eff298b82f7e0562 # v1.3.0
        with:
          doppler-token: ${{ secrets.ci_secret_provider_token }}
          inject-env-vars: true

      - name: Fetch Doppler-managed runtime secrets via OIDC
        if: ${{ steps.direct_secrets.outputs.present != 'true' && steps.secret_config.outputs.manager == 'doppler' && steps.doppler_token.outputs.present == 'false' }}
        uses: DopplerHQ/secrets-fetch-action@cd2efbf9a404504316435873eff298b82f7e0562 # v1.3.0
        with:
          auth-method: oidc
          doppler-identity-id: ${{ inputs.doppler_identity_id }}
          doppler-project: ${{ steps.secret_config.outputs.project_id }}
          doppler-config: ${{ steps.secret_config.outputs.secret_environment }}
          inject-env-vars: true

      - name: Fetch Infisical-managed runtime secrets via OIDC
        if: ${{ steps.direct_secrets.outputs.present != 'true' && steps.secret_config.outputs.manager == 'infisical' }}
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ inputs.infisical_identity_id }}
          project-slug: ${{ steps.secret_config.outputs.project_id }}
          env-slug: ${{ steps.secret_config.outputs.secret_environment }}

      - name: Install caller dependencies
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$INSTALL_COMMAND"

      - name: Run caller verify block
        shell: bash
        env:
          VERIFY_COMMAND: ${{ inputs.verify_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$VERIFY_COMMAND"

      - name: Run caller deploy block
        if: ${{ inputs.mode == 'deploy' }}
        shell: bash
        env:
          DEPLOY_COMMAND: ${{ inputs.deploy_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$DEPLOY_COMMAND"

      - name: Require preview destroy command when mode=destroy
        if: ${{ inputs.mode == 'destroy' && inputs.destroy_command == '' }}
        shell: bash
        run: |
          echo "mode=destroy requires workflow_call input destroy_command." >&2
          exit 1

      - name: Run caller destroy block
        if: ${{ inputs.mode == 'destroy' && inputs.destroy_command != '' }}
        shell: bash
        env:
          DESTROY_COMMAND: ${{ inputs.destroy_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$DESTROY_COMMAND"

      - name: Run caller smoke block
        if: ${{ inputs.mode == 'deploy' && inputs.smoke_command != '' }}
        shell: bash
        env:
          SMOKE_COMMAND: ${{ inputs.smoke_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$SMOKE_COMMAND"
