name: Reusable Cloudflare preview deploy

on:
  workflow_call:
    inputs:
      lane:
        description: "Canonical preview lane: preview_main or preview_pr_<n>"
        required: true
        type: string
      mode:
        description: "deploy or destroy"
        required: false
        default: deploy
        type: string
      install_command:
        description: "Caller-owned install/bootstrap command block"
        required: true
        type: string
      verify_command:
        description: "Caller-owned verify/build command block"
        required: true
        type: string
      deploy_command:
        description: "Caller-owned deploy command block"
        required: true
        type: string
      destroy_command:
        description: "Caller-owned preview destroy command block"
        required: false
        default: ""
        type: string
      smoke_command:
        description: "Caller-owned post-deploy smoke command block"
        required: false
        default: ""
        type: string
      secret_env_profile:
        description: "Repo-owned secret-manager environment/profile slug"
        required: false
        default: ""
        type: string
      runner:
        description: "Runner label"
        required: false
        default: ubuntu-latest
        type: string
      skip_when_ci_secret_missing:
        description: "Skip deploy/destroy when the explicit provider bootstrap secret is absent"
        required: false
        default: false
        type: boolean
    secrets:
      ci_secret_provider_token:
        required: false
      cloudflare_account_id:
        required: false
      cloudflare_api_token:
        required: false
      cloudflare_zone_id:
        required: false
      neon_api_key:
        required: false
      neon_project_id:
        required: false
      neon_parent_branch_id:
        required: false
      pulumi_access_token:
        required: false
      better_auth_secret:
        required: false
      jwt_secret:
        required: false
      langfuse_public_key:
        required: false
      langfuse_secret_key:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preview:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      id-token: write
      packages: read
    env:
      DEPLOY_LANE: ${{ inputs.lane }}
      DEPLOY_MODE: ${{ inputs.mode }}
      RELEASE_VERSION: ""
      SECRET_PROFILE_NAME: ${{ inputs.secret_env_profile }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate preview contract inputs
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const lane = process.env.DEPLOY_LANE ?? "";
          const mode = process.env.DEPLOY_MODE ?? "";
          if (!/^preview_main$|^preview_pr_\d+$/u.test(lane)) {
            throw new Error(`Invalid preview lane "${lane}". Use preview_main or preview_pr_<n>.`);
          }
          if (mode !== "deploy" && mode !== "destroy") {
            throw new Error(`Invalid preview mode "${mode}". Use deploy or destroy.`);
          }
          NODE

      - name: Evaluate CI bootstrap secret availability
        id: secret_gate
        shell: bash
        env:
          TOKEN_PRESENT: ${{ secrets.ci_secret_provider_token != '' && 'true' || 'false' }}
          SKIP_ALLOWED: ${{ inputs.skip_when_ci_secret_missing && 'true' || 'false' }}
        run: |
          set -euo pipefail
          if [[ "${TOKEN_PRESENT}" == "true" ]]; then
            {
              echo "ready=true"
              echo "should_fail=false"
              echo "skipped=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${SKIP_ALLOWED}" == "true" ]]; then
            {
              echo "ready=false"
              echo "should_fail=false"
              echo "skipped=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "ready=false"
            echo "should_fail=true"
            echo "skipped=false"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve caller pnpm version
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        id: pnpm
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const packageManager = typeof manifest.packageManager === "string" ? manifest.packageManager : "";
          const match = /^pnpm@(.+)$/u.exec(packageManager);
          if (!match) {
            throw new Error('package.json must declare packageManager like "pnpm@<version>" for the shared deploy harness.');
          }
          console.log(`version=${match[1]}`);
          NODE

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        with:
          version: ${{ steps.pnpm.outputs.version }}
          run_install: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        with:
          node-version: "24.16.0"
          cache: pnpm

      - name: Enable Corepack + caller pnpm
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${{ steps.pnpm.outputs.version }}" --activate

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        with:
          bun-version: latest

      - name: Read committed secret-manager metadata
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        id: secret_config
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const path = ".webpresso/secrets.config.json";
          if (!fs.existsSync(path)) {
            throw new Error(`Missing ${path}. Commit repo secret-manager metadata before using the shared deploy harness.`);
          }
          const payload = JSON.parse(fs.readFileSync(path, "utf8"));
          if (payload?.schemaVersion !== 1) {
            throw new Error(`Unsupported secret config schemaVersion in ${path}. Expected schemaVersion: 1.`);
          }
          const manager = payload?.providers?.default?.type;
          const projectId = payload?.providers?.default?.project;
          const profiles = payload?.profiles;
          if (manager !== "doppler" && manager !== "infisical") {
            throw new Error(`Unsupported secret manager "${String(manager)}" in ${path}. Use providers.default.type.`);
          }
          if (typeof projectId !== "string" || projectId.length === 0) {
            throw new Error(`Invalid providers.default.project in ${path}.`);
          }
          const profileName = process.env.SECRET_PROFILE_NAME ?? "";
          if (profileName.length > 0) {
            const profile = profiles?.[profileName];
            if (!profile || typeof profile.environment !== "string" || profile.environment.length === 0) {
              throw new Error(`Unknown secret profile "${profileName}" in ${path}.`);
            }
            console.log(`resolved_env_profile=${profile.environment}`);
          }
          console.log(`manager=${manager}`);
          console.log(`project_id=${projectId}`);
          NODE

      - name: Install Doppler CLI bridge
        if: ${{ steps.secret_gate.outputs.ready == 'true' && steps.secret_config.outputs.manager == 'doppler' }}
        uses: dopplerhq/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3

      - name: Fail when CI bootstrap secret is required but missing
        if: ${{ steps.secret_gate.outputs.should_fail == 'true' }}
        shell: bash
        run: |
          echo "Missing required reusable-workflow secret: ci_secret_provider_token" >&2
          echo "Configure a provider bootstrap secret in the caller repo, then pass it explicitly via workflow-call secrets." >&2
          exit 1

      - name: Install caller dependencies
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$INSTALL_COMMAND"

      - name: Inject Doppler-managed runtime secrets
        if: ${{ steps.secret_gate.outputs.ready == 'true' && steps.secret_config.outputs.manager == 'doppler' }}
        uses: dopplerhq/secrets-fetch-action@451892f16195f9ac360e1a5bcbf0b5fd0e957534 # v2.0.0
        with:
          doppler-token: ${{ secrets.ci_secret_provider_token }}
          inject-env-vars: true

      - name: Install Infisical CLI
        if: ${{ steps.secret_gate.outputs.ready == 'true' && steps.secret_config.outputs.manager == 'infisical' }}
        shell: bash
        env:
          INFISICAL_DISABLE_UPDATE_CHECK: "true"
        run: |
          set -euo pipefail
          npm install --global @infisical/cli@0.43.91

      - name: Inject Infisical-managed runtime secrets
        if: ${{ steps.secret_gate.outputs.ready == 'true' && steps.secret_config.outputs.manager == 'infisical' }}
        shell: bash
        env:
          INFISICAL_DISABLE_UPDATE_CHECK: "true"
          INFISICAL_TOKEN: ${{ secrets.ci_secret_provider_token }}
          INFISICAL_ENV_SLUG: ${{ steps.secret_config.outputs.resolved_env_profile }}
          INFISICAL_PROJECT_ID: ${{ steps.secret_config.outputs.project_id }}
        run: |
          set -euo pipefail
          if [[ -z "${INFISICAL_ENV_SLUG}" ]]; then
            echo "Infisical bootstrap requires workflow_call input secret_env_profile." >&2
            exit 1
          fi
          tmp_json="$(mktemp)"
          trap 'rm -f "$tmp_json"' EXIT
          infisical export --projectId="${INFISICAL_PROJECT_ID}" --env="${INFISICAL_ENV_SLUG}" --format=json > "${tmp_json}"
          node - "${tmp_json}" "$GITHUB_ENV" <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const payloadPath = process.argv[2];
          const envPath = process.argv[3];
          const secrets = JSON.parse(fs.readFileSync(payloadPath, "utf8"));
          const isValidKey = (value) => /^[A-Z_][A-Z0-9_]*$/u.test(value);
          const maskValue = (value) =>
            value.replace(/%/gu, "%25").replace(/\r/gu, "%0D").replace(/\n/gu, "%0A");
          for (const [key, value] of Object.entries(secrets)) {
            if (!isValidKey(key)) {
              throw new Error(`Invalid secret key from Infisical: ${key}`);
            }
            const rendered = String(value ?? "");
            process.stdout.write(`::add-mask::${maskValue(rendered)}\n`);
            const delimiter = `__INFISICAL_${crypto.randomUUID()}__`;
            if (rendered.includes(delimiter)) {
              throw new Error(`Generated Infisical delimiter collided with secret value for ${key}`);
            }
            fs.appendFileSync(envPath, `${key}<<${delimiter}\n${rendered}\n${delimiter}\n`);
          }
          NODE

      - name: Export optional direct runtime secrets
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID_VALUE: ${{ secrets.cloudflare_account_id }}
          CLOUDFLARE_API_TOKEN_VALUE: ${{ secrets.cloudflare_api_token }}
          CLOUDFLARE_ZONE_ID_VALUE: ${{ secrets.cloudflare_zone_id }}
          NEON_API_KEY_VALUE: ${{ secrets.neon_api_key }}
          NEON_PROJECT_ID_VALUE: ${{ secrets.neon_project_id }}
          NEON_PARENT_BRANCH_ID_VALUE: ${{ secrets.neon_parent_branch_id }}
          PULUMI_ACCESS_TOKEN_VALUE: ${{ secrets.pulumi_access_token }}
          BETTER_AUTH_SECRET_VALUE: ${{ secrets.better_auth_secret }}
          JWT_SECRET_VALUE: ${{ secrets.jwt_secret }}
          LANGFUSE_PUBLIC_KEY_VALUE: ${{ secrets.langfuse_public_key }}
          LANGFUSE_SECRET_KEY_VALUE: ${{ secrets.langfuse_secret_key }}
        run: |
          set -euo pipefail
          write_secret_env() {
            local key="$1"
            local value="$2"
            if [[ -z "$value" ]]; then
              return
            fi
            local delimiter
            delimiter="__DIRECT_SECRET_$(python3 -c 'import uuid; print(uuid.uuid4().hex)')"
            if [[ "$value" == *"$delimiter"* ]]; then
              echo "Secret value for ${key} collides with generated delimiter." >&2
              exit 1
            fi
            {
              printf '%s<<%s\n' "${key}" "${delimiter}"
              printf '%s\n' "${value}"
              printf '%s\n' "${delimiter}"
            } >> "$GITHUB_ENV"
          }
          write_secret_env "CLOUDFLARE_ACCOUNT_ID" "${CLOUDFLARE_ACCOUNT_ID_VALUE}"
          write_secret_env "CLOUDFLARE_API_TOKEN" "${CLOUDFLARE_API_TOKEN_VALUE}"
          write_secret_env "CLOUDFLARE_ZONE_ID" "${CLOUDFLARE_ZONE_ID_VALUE}"
          write_secret_env "NEON_API_KEY" "${NEON_API_KEY_VALUE}"
          write_secret_env "NEON_PROJECT_ID" "${NEON_PROJECT_ID_VALUE}"
          write_secret_env "NEON_PARENT_BRANCH_ID" "${NEON_PARENT_BRANCH_ID_VALUE}"
          write_secret_env "PULUMI_ACCESS_TOKEN" "${PULUMI_ACCESS_TOKEN_VALUE}"
          write_secret_env "BETTER_AUTH_SECRET" "${BETTER_AUTH_SECRET_VALUE}"
          write_secret_env "JWT_SECRET" "${JWT_SECRET_VALUE}"
          write_secret_env "LANGFUSE_PUBLIC_KEY" "${LANGFUSE_PUBLIC_KEY_VALUE}"
          write_secret_env "LANGFUSE_SECRET_KEY" "${LANGFUSE_SECRET_KEY_VALUE}"

      - name: Run caller verify block
        if: ${{ steps.secret_gate.outputs.skipped != 'true' }}
        shell: bash
        env:
          VERIFY_COMMAND: ${{ inputs.verify_command }}
          SECRET_ENV_PROFILE: ${{ steps.secret_config.outputs.resolved_env_profile }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$VERIFY_COMMAND"

      - name: Skip preview execution when bootstrap secret is unavailable
        if: ${{ steps.secret_gate.outputs.skipped == 'true' }}
        shell: bash
        run: |
          echo "Skipping preview ${DEPLOY_MODE} for ${DEPLOY_LANE}: ci_secret_provider_token is not configured in the caller repo."

      - name: Run caller deploy block
        if: ${{ steps.secret_gate.outputs.ready == 'true' && inputs.mode == 'deploy' }}
        shell: bash
        env:
          DEPLOY_COMMAND: ${{ inputs.deploy_command }}
          SECRET_ENV_PROFILE: ${{ steps.secret_config.outputs.resolved_env_profile }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$DEPLOY_COMMAND"

      - name: Require preview destroy command when mode=destroy
        if: ${{ steps.secret_gate.outputs.ready == 'true' && inputs.mode == 'destroy' && inputs.destroy_command == '' }}
        shell: bash
        run: |
          echo "mode=destroy requires workflow_call input destroy_command." >&2
          exit 1

      - name: Run caller destroy block
        if: ${{ steps.secret_gate.outputs.ready == 'true' && inputs.mode == 'destroy' && inputs.destroy_command != '' }}
        shell: bash
        env:
          DESTROY_COMMAND: ${{ inputs.destroy_command }}
          SECRET_ENV_PROFILE: ${{ steps.secret_config.outputs.resolved_env_profile }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$DESTROY_COMMAND"

      - name: Run caller smoke block
        if: ${{ steps.secret_gate.outputs.ready == 'true' && inputs.mode == 'deploy' && inputs.smoke_command != '' }}
        shell: bash
        env:
          SMOKE_COMMAND: ${{ inputs.smoke_command }}
          SECRET_ENV_PROFILE: ${{ steps.secret_config.outputs.resolved_env_profile }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$SMOKE_COMMAND"
