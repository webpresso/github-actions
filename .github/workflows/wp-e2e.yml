name: Reusable wp e2e

on:
  workflow_call:
    inputs:
      install_command:
        description: "Caller-owned install/bootstrap command block"
        required: true
        type: string
      verify_command:
        description: "Caller-owned verify/build command block"
        required: true
        type: string
      e2e_command:
        description: "Caller-owned e2e command block"
        required: true
        type: string
      secret_env_profile:
        description: "Repo-owned secret-manager environment/profile slug"
        required: false
        default: ""
        type: string
      runner:
        description: "Runner label"
        required: false
        default: ubuntu-latest
        type: string
    secrets:
      ci_secret_provider_token:
        required: false
      cloudflare_account_id:
        required: false
      cloudflare_api_token:
        required: false
      cloudflare_zone_id:
        required: false
      neon_api_key:
        required: false
      neon_project_id:
        required: false
      neon_parent_branch_id:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve caller pnpm version
        id: pnpm
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const packageManager = typeof manifest.packageManager === "string" ? manifest.packageManager : "";
          const match = /^pnpm@(.+)$/u.exec(packageManager);
          if (!match) {
            throw new Error('package.json must declare packageManager like "pnpm@<version>" for the shared e2e harness.');
          }
          console.log(`version=${match[1]}`);
          NODE

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: ${{ steps.pnpm.outputs.version }}
          run_install: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24.16.0"
          cache: pnpm

      - name: Enable Corepack + caller pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${{ steps.pnpm.outputs.version }}" --activate

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Read committed secret-manager metadata
        id: secret_config
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const path = ".webpresso/secrets.config.json";
          if (!fs.existsSync(path)) {
            throw new Error(`Missing ${path}. Commit repo secret-manager metadata before using the shared e2e harness.`);
          }
          const payload = JSON.parse(fs.readFileSync(path, "utf8"));
          if (payload?.schemaVersion !== 1) {
            throw new Error(`Unsupported secret config schemaVersion in ${path}. Expected schemaVersion: 1.`);
          }
          const manager = payload?.providers?.default?.type;
          const projectId = payload?.providers?.default?.project;
          if (manager !== "doppler" && manager !== "infisical") {
            throw new Error(`Unsupported secret manager "${String(manager)}" in ${path}. Use providers.default.type.`);
          }
          if (typeof projectId !== "string" || projectId.length === 0) {
            throw new Error(`Invalid providers.default.project in ${path}.`);
          }
          console.log(`manager=${manager}`);
          console.log(`project_id=${projectId}`);
          NODE

      - name: Require explicit CI bootstrap secret
        shell: bash
        env:
          TOKEN_PRESENT: ${{ secrets.ci_secret_provider_token != '' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          if [[ "${TOKEN_PRESENT}" != "true" ]]; then
            echo "Missing required reusable-workflow secret: ci_secret_provider_token" >&2
            exit 1
          fi

      - name: Install Doppler CLI bridge
        if: ${{ steps.secret_config.outputs.manager == 'doppler' }}
        uses: dopplerhq/cli-action@014df23b1329b615816a38eb5f473bb9000700b1 # v3

      - name: Install caller dependencies
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INSTALL_COMMAND: ${{ inputs.install_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$INSTALL_COMMAND"

      - name: Inject Doppler-managed runtime secrets
        if: ${{ steps.secret_config.outputs.manager == 'doppler' }}
        uses: dopplerhq/secrets-fetch-action@451892f16195f9ac360e1a5bcbf0b5fd0e957534 # v2.0.0
        with:
          doppler-token: ${{ secrets.ci_secret_provider_token }}
          inject-env-vars: true

      - name: Inject Infisical-managed runtime secrets
        if: ${{ steps.secret_config.outputs.manager == 'infisical' }}
        shell: bash
        env:
          INFISICAL_DISABLE_UPDATE_CHECK: "true"
          INFISICAL_TOKEN: ${{ secrets.ci_secret_provider_token }}
          INFISICAL_ENV_SLUG: ${{ inputs.secret_env_profile }}
          INFISICAL_PROJECT_ID: ${{ steps.secret_config.outputs.project_id }}
        run: |
          set -euo pipefail
          if [[ -z "${INFISICAL_ENV_SLUG}" ]]; then
            echo "Infisical bootstrap requires workflow_call input secret_env_profile." >&2
            exit 1
          fi
          npm install --global @infisical/cli@0.43.91
          tmp_json="$(mktemp)"
          trap 'rm -f "$tmp_json"' EXIT
          infisical export --projectId="${INFISICAL_PROJECT_ID}" --env="${INFISICAL_ENV_SLUG}" --format=json > "${tmp_json}"
          node - "${tmp_json}" "$GITHUB_ENV" <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const payloadPath = process.argv[2];
          const envPath = process.argv[3];
          const secrets = JSON.parse(fs.readFileSync(payloadPath, "utf8"));
          const isValidKey = (value) => /^[A-Z_][A-Z0-9_]*$/u.test(value);
          const maskValue = (value) =>
            value.replace(/%/gu, "%25").replace(/\r/gu, "%0D").replace(/\n/gu, "%0A");
          for (const [key, value] of Object.entries(secrets)) {
            if (!isValidKey(key)) {
              throw new Error(`Invalid secret key from Infisical: ${key}`);
            }
            const rendered = String(value ?? "");
            process.stdout.write(`::add-mask::${maskValue(rendered)}\n`);
            const delimiter = `__INFISICAL_${crypto.randomUUID()}__`;
            if (rendered.includes(delimiter)) {
              throw new Error(`Generated Infisical delimiter collided with secret value for ${key}`);
            }
            fs.appendFileSync(envPath, `${key}<<${delimiter}\n${rendered}\n${delimiter}\n`);
          }
          NODE

      - name: Export optional direct runtime secrets
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID_VALUE: ${{ secrets.cloudflare_account_id }}
          CLOUDFLARE_API_TOKEN_VALUE: ${{ secrets.cloudflare_api_token }}
          CLOUDFLARE_ZONE_ID_VALUE: ${{ secrets.cloudflare_zone_id }}
          NEON_API_KEY_VALUE: ${{ secrets.neon_api_key }}
          NEON_PROJECT_ID_VALUE: ${{ secrets.neon_project_id }}
          NEON_PARENT_BRANCH_ID_VALUE: ${{ secrets.neon_parent_branch_id }}
        run: |
          set -euo pipefail
          write_secret_env() {
            local key="$1"
            local value="$2"
            if [[ -z "${value}" ]]; then
              return 0
            fi
            {
              echo "${key}<<__SECRET_ENV__"
              echo "${value}"
              echo "__SECRET_ENV__"
            } >> "$GITHUB_ENV"
          }
          write_secret_env "CLOUDFLARE_ACCOUNT_ID" "${CLOUDFLARE_ACCOUNT_ID_VALUE}"
          write_secret_env "CLOUDFLARE_API_TOKEN" "${CLOUDFLARE_API_TOKEN_VALUE}"
          write_secret_env "CLOUDFLARE_ZONE_ID" "${CLOUDFLARE_ZONE_ID_VALUE}"
          write_secret_env "NEON_API_KEY" "${NEON_API_KEY_VALUE}"
          write_secret_env "NEON_PROJECT_ID" "${NEON_PROJECT_ID_VALUE}"
          write_secret_env "NEON_PARENT_BRANCH_ID" "${NEON_PARENT_BRANCH_ID_VALUE}"

      - name: Verify caller surface
        shell: bash
        env:
          VERIFY_COMMAND: ${{ inputs.verify_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$VERIFY_COMMAND"

      - name: Run caller e2e command
        shell: bash
        env:
          E2E_COMMAND: ${{ inputs.e2e_command }}
        run: |
          set -euo pipefail
          bash -leo pipefail -c "$E2E_COMMAND"
