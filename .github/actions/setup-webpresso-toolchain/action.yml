name: Set up Webpresso workflow toolchain
description: >
  Resolve the caller's pnpm version, install pnpm, configure Node.js and
  Corepack, and optionally install Bun.
inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "24.16.0"
  package-manager-cache:
    description: "actions/setup-node cache value; use pnpm or false"
    required: false
    default: "pnpm"
  install-bun:
    description: "Whether to install Bun"
    required: false
    default: "true"
  cli-global-packages:
    description: >
      Space-separated dependency names to install globally at the caller's
      pinned version (read from the caller package.json). Explicit package
      specs like name@1.2.3 pass through unchanged. Entries resolving to
      catalog:/workspace:/link: are skipped. Empty disables the step.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Resolve caller pnpm version
      id: pnpm
      shell: bash
      run: |
        set -euo pipefail
        node <<'NODE' >> "$GITHUB_OUTPUT"
        const fs = require("node:fs");
        const manifest = JSON.parse(fs.readFileSync("package.json", "utf8"));
        const packageManager = typeof manifest.packageManager === "string" ? manifest.packageManager : "";
        const match = /^pnpm@(.+)$/u.exec(packageManager);
        if (!match) {
          throw new Error('package.json must declare packageManager like "pnpm@<version>" for the shared workflow harness.');
        }
        console.log(`version=${match[1]}`);
        NODE

    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      with:
        version: ${{ steps.pnpm.outputs.version }}
        run_install: false

    - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      if: ${{ inputs.package-manager-cache != 'false' }}
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.package-manager-cache }}

    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      if: ${{ inputs.package-manager-cache == 'false' }}
      with:
        node-version: ${{ inputs.node-version }}
        package-manager-cache: false

    - name: Enable Corepack + caller pnpm
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        corepack prepare "pnpm@${{ steps.pnpm.outputs.version }}" --activate

    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      if: ${{ inputs.install-bun == 'true' }}
      with:
        bun-version: latest

    - name: Install caller-pinned CLI globals
      if: ${{ inputs.cli-global-packages != '' }}
      shell: bash
      env:
        CLI_GLOBAL_PACKAGES: ${{ inputs.cli-global-packages }}
      run: |
        set -euo pipefail
        specs="$(node <<'NODE'
        const fs = require("node:fs");
        const manifest = JSON.parse(fs.readFileSync("package.json", "utf8"));
        const ranges = { ...(manifest.dependencies ?? {}), ...(manifest.devDependencies ?? {}) };
        const requested = (process.env.CLI_GLOBAL_PACKAGES ?? "").split(/\s+/u).filter(Boolean);
        const specs = [];
        for (const name of requested) {
          const hasExplicitVersion =
            /^[^@/\s][^@\s]*@.+$/u.test(name) || /^@[^/\s]+\/[^@\s]+@.+$/u.test(name);
          if (hasExplicitVersion) {
            specs.push(name);
            continue;
          }
          const range = ranges[name];
          if (typeof range !== "string" || range === "") continue;
          if (range === "catalog:" || range.startsWith("workspace:") || range.startsWith("link:")) continue;
          specs.push(`${name}@${range}`);
        }
        process.stdout.write(specs.join(" "));
        NODE
        )"
        if [[ -n "${specs}" ]]; then
          echo "Installing caller-pinned CLI globals: ${specs}"
          npm install -g ${specs}
        else
          echo "No concrete caller CLI versions to install globally; skipping."
        fi
